# Perfil de producción: exige las variables de entorno (sin defaults) y reduce verbosidad.
# Activar con SPRING_PROFILES_ACTIVE=prod.
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    properties:
      hibernate:
        format_sql: false

app:
  jwt:
    secret: ${JWT_SECRET}
  seed:
    enabled: false

management:
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: info
    org.flywaydb: warn
