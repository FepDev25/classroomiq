spring:
  application:
    name: classroomiq-backend

  # WebFlux convive en el classpath para el SSE de procesamiento (Flux + Reactor Sinks), pero la
  # app corre como servlet (MVC) para el resto de la API. Explícito para evitar ambigüedad.
  main:
    web-application-type: servlet

  config:
    import: "optional:file:.env[.properties],optional:file:../.env[.properties]"

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/classroomiq}
    username: ${DB_USERNAME:classroomiq}
    password: ${DB_PASSWORD:classroomiq}

  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:50MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:200MB}

  jpa:
    open-in-view: false
    hibernate:
      # Flyway es el dueño del esquema; Hibernate solo valida que las entidades coincidan.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

# Configuración propia de la app. El JWT se usa a partir de la Fase 2 (Hito 3 - auth).
app:
  jwt:
    issuer: classroomiq
    secret: ${JWT_SECRET:dev-only-secret-change-me-please-32bytes-minimum-aaaaaaaa}
    access-token-ttl: PT1H
  # Siembra de datos de demo al arrancar (institución + admin + docente + rúbricas de ejemplo).
  # Idempotente: solo siembra si la base está vacía. Desactivado en prod y en tests.
  seed:
    enabled: ${SEED_ENABLED:true}

  # Almacenamiento local de los archivos de entregas (organizado por tenant/materia/lote/entrega).
  # Datos sensibles: no salen del servidor ni se versionan
  storage:
    base-path: ${STORAGE_BASE_PATH:./var/entregas}

  # Chunking del texto extraído antes de generar embeddings. Presupuesto en caracteres
  # (~4 chars/token): 2000 ≈ 500 tokens, con 300 de solape (~15%).
  chunking:
    max-chars: ${CHUNK_MAX_CHARS:2000}
    overlap-chars: ${CHUNK_OVERLAP_CHARS:300}

  # Retrieval semántico por criterio (RAG): cuántos fragmentos relevantes de la entrega se
  # recuperan por criterio para construir el prompt del LLM.
  evaluacion:
    retrieval:
      top-k: ${EVAL_RETRIEVAL_TOPK:8}

  # Motor de evaluación LLM . Proveedor intercambiable; por ahora Anthropic cloud.
  # Estrategia de dos niveles: modelo potente para el análisis por criterio, económico para
  # tareas simples (clasificación/extracción de fases posteriores).
  llm:
    provider: ${LLM_PROVIDER:anthropic}
    modelo-potente: ${LLM_MODELO_POTENTE:claude-sonnet-4-6}
    modelo-economico: ${LLM_MODELO_ECONOMICO:claude-haiku-4-5}
    max-tokens: ${LLM_MAX_TOKENS:8000}
    # Nivel de esfuerzo del tier potente (low|medium|high|max). No aplica al económico.
    # high tras validar vs ground truth: medium bajó el acierto exacto (92%→89%) y ahorró solo ~$0.01
    # (la salida/thinking domina el costo y casi no cambió con medium). No compensa; quedamos en high.
    effort: ${LLM_EFFORT:high}
    # Si es true, al arrancar se hace una llamada sonda al proveedor (fail-fast de API key).
    verify-on-startup: ${LLM_VERIFY_ON_STARTUP:false}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}

  embeddings:
    provider: ${EMBEDDINGS_PROVIDER:ollama}
    dimension: ${EMBEDDINGS_DIMENSION:1024}
    verify-on-startup: ${EMBEDDINGS_VERIFY_ON_STARTUP:false}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: ${OLLAMA_EMBED_MODEL:bge-m3}
      timeout: ${OLLAMA_TIMEOUT:PT30S}
      batch-size: ${OLLAMA_EMBED_BATCH:16}

  # Detección de similitud entre entregas del mismo lote, umbral-default: "similitud alta"
  # por defecto 0.75, si el docente no especifica; top-fragmentos: pares de fragmentos
  # de mayor similitud que se guardan por par para la visualización lado a lado.
  similitud:
    umbral-default: ${SIMILITUD_UMBRAL_DEFAULT:0.75}
    top-fragmentos: ${SIMILITUD_TOP_FRAGMENTOS:5}

logging:
  level:
    org.flywaydb: info
