spring:
  application:
    name: classroomiq-backend

  # Carga el .env de la raíz del repo para el desarrollo local, de modo que DB_URL/credenciales
  # del .env apliquen al correr `./mvnw spring-boot:run` (Spring no lee .env por sí solo).
  # `..` cubre la ejecución desde backend/; la primera ruta cubre ejecución desde la raíz.
  # En prod se usan variables de entorno reales, no este archivo.
  config:
    import: "optional:file:.env[.properties],optional:file:../.env[.properties]"

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/classroomiq}
    username: ${DB_USERNAME:classroomiq}
    password: ${DB_PASSWORD:classroomiq}

  jpa:
    open-in-view: false
    hibernate:
      # Flyway es el dueño del esquema; Hibernate solo valida que las entidades coincidan.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

# Configuración propia de la app. El JWT se usa a partir de la Fase 2 (Hito 3 - auth).
app:
  jwt:
    issuer: classroomiq
    secret: ${JWT_SECRET:dev-only-secret-change-me-please-32bytes-minimum-aaaaaaaa}
    access-token-ttl: PT1H

logging:
  level:
    org.flywaydb: info
