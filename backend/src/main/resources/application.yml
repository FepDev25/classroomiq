spring:
  application:
    name: classroomiq-backend

  # WebFlux convive en el classpath para el SSE de procesamiento (Flux + Reactor Sinks), pero la
  # app corre como servlet (MVC) para el resto de la API. Explícito para evitar ambigüedad.
  main:
    web-application-type: servlet

  config:
    import: "optional:file:.env[.properties],optional:file:../.env[.properties]"

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/classroomiq}
    username: ${DB_USERNAME:classroomiq}
    password: ${DB_PASSWORD:classroomiq}

  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:50MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:200MB}

  jpa:
    open-in-view: false
    hibernate:
      # Flyway es el dueño del esquema; Hibernate solo valida que las entidades coincidan.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

# Configuración propia de la app. El JWT se usa a partir de la Fase 2 (Hito 3 - auth).
app:
  jwt:
    issuer: classroomiq
    secret: ${JWT_SECRET:dev-only-secret-change-me-please-32bytes-minimum-aaaaaaaa}
    access-token-ttl: PT1H
  # Siembra de datos de demo al arrancar (institución + admin + docente + rúbricas de ejemplo).
  # Idempotente: solo siembra si la base está vacía. Desactivado en prod y en tests.
  seed:
    enabled: ${SEED_ENABLED:true}

  # Almacenamiento local de los archivos de entregas (organizado por tenant/materia/lote/entrega).
  # Datos sensibles: no salen del servidor ni se versionan
  storage:
    base-path: ${STORAGE_BASE_PATH:./var/entregas}

  # Chunking del texto extraído antes de generar embeddings. Presupuesto en caracteres
  # (~4 chars/token): 2000 ≈ 500 tokens, con 300 de solape (~15%).
  chunking:
    max-chars: ${CHUNK_MAX_CHARS:2000}
    overlap-chars: ${CHUNK_OVERLAP_CHARS:300}

  embeddings:
    provider: ${EMBEDDINGS_PROVIDER:ollama}
    dimension: ${EMBEDDINGS_DIMENSION:1024}
    verify-on-startup: ${EMBEDDINGS_VERIFY_ON_STARTUP:false}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: ${OLLAMA_EMBED_MODEL:bge-m3}
      timeout: ${OLLAMA_TIMEOUT:PT30S}
      batch-size: ${OLLAMA_EMBED_BATCH:16}

logging:
  level:
    org.flywaydb: info
